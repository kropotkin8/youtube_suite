services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: yt_user
      POSTGRES_PASSWORD: yt_pass
      POSTGRES_DB: youtube_suite
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://yt_user:yt_pass@db:5432/youtube_suite
    env_file:
      - .env

volumes:
  pgdata:
